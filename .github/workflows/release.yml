name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and attach zip to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          cd custom_components/wapda_monitor
          zip -r ../../wapda_monitor.zip .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: wapda_monitor.zip
